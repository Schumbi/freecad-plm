<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FreeCAD-PLM</title>
  <style>
    body {
      color: #1f2933;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f7f7f4;
    }
    header {
      background: #263238;
      color: white;
      padding: 0.8rem 1.2rem;
    }
    header a {
      color: white;
      font-weight: 700;
      text-decoration: none;
    }
    main {
      margin: 0 auto;
      max-width: 1100px;
      padding: 1.5rem;
    }
    a {
      color: #0f766e;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
    }
    th,
    td {
      border-bottom: 1px solid #e5e7eb;
      padding: 0.65rem;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #eef2f0;
    }
    .actions,
    form {
      margin-top: 1rem;
    }
    button {
      background: #0f766e;
      border: 0;
      color: white;
      cursor: pointer;
      font-weight: 700;
      padding: 0.55rem 0.9rem;
    }
    input[type="file"] {
      display: block;
      margin: 0.4rem 0;
    }
    .message {
      background: #ecfdf5;
      border: 1px solid #99f6e4;
      margin-bottom: 1rem;
      padding: 0.75rem;
    }
    .errors {
      color: #b91c1c;
      margin: 0.4rem 0;
    }
    details {
      margin-top: 0.25rem;
    }
    summary {
      color: #0f766e;
      cursor: pointer;
      font-weight: 700;
    }
    textarea {
      box-sizing: border-box;
      display: block;
      margin: 0.4rem 0;
      max-width: 42rem;
      width: 100%;
    }
    .notes-text {
      background: #fafaf8;
      border: 1px solid #e5e7eb;
      margin: 0.5rem 0;
      padding: 0.6rem;
      white-space: pre-wrap;
    }
    .metadata-list {
      margin: 0.5rem 0;
      padding-left: 1rem;
    }
    .metadata-list dt {
      font-weight: 700;
      margin-top: 0.4rem;
    }
    .metadata-list dd {
      margin-left: 0;
    }
  </style>
</head>
<body>
  <header><a href="{% url 'plm:project_list' %}">FreeCAD-PLM</a></header>
  <main>
    {% for message in messages %}
      <div class="message">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
