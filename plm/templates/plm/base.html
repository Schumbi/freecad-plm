<!doctype html>
{% load static %}
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FreeCAD-PLM</title>
  <link rel="stylesheet" href="{% static 'plm/vendor/bootstrap4/css/bootstrap.min.css' %}">
  <style>
    :root {
      --page-bg: #f4f6f8;
      --surface: #ffffff;
      --surface-soft: #f8fafb;
      --surface-muted: #eef3f4;
      --border: #d8e0e4;
      --border-soft: #e7ecef;
      --text: #1f2933;
      --muted: #64717d;
      --accent: #146c63;
      --accent-dark: #0f514b;
      --accent-soft: #e4f2ef;
      --danger: #a33a3a;
      --danger-soft: #f8e8e8;
      --shadow: 0 10px 28px rgba(32, 46, 54, 0.08);
      --radius: 8px;
      --space-1: 0.35rem;
      --space-2: 0.6rem;
      --space-3: 0.9rem;
      --space-4: 1.25rem;
      --space-5: 1.8rem;
    }
    * {
      box-sizing: border-box;
    }
    body {
      color: var(--text);
      background: var(--page-bg);
    }
    header {
      background: #213139;
      border-bottom: 1px solid #18272e;
      color: white;
    }
    header .navbar {
      min-height: 3.4rem;
      padding-left: var(--space-4);
      padding-right: var(--space-4);
    }
    header a,
    header .navbar-brand {
      color: white;
      font-weight: 700;
      text-decoration: none;
    }
    main {
      margin: 0 auto;
      max-width: 1280px;
      padding: var(--space-4);
    }
    h1,
    h2,
    h3,
    h4 {
      color: #18242b;
      line-height: 1.2;
    }
    h1 {
      font-size: 1.85rem;
      margin: 0;
    }
    h2 {
      font-size: 1.2rem;
      margin: var(--space-5) 0 var(--space-3);
    }
    h3,
    h4 {
      margin-bottom: 0.5rem;
    }
    p {
      margin: 0 0 var(--space-2);
    }
    a {
      color: var(--accent);
      text-decoration-thickness: 1px;
      text-underline-offset: 0.16em;
    }
    table {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      background: var(--surface);
      margin-bottom: var(--space-4);
    }
    th,
    td {
      border-bottom: 1px solid var(--border-soft);
      padding: 0.58rem 0.7rem;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: var(--surface-muted);
      color: #334149;
      font-size: 0.88rem;
      font-weight: 700;
    }
    tr:last-child td {
      border-bottom: 0;
    }
    tr:hover td {
      background: #fbfcfd;
    }
    .actions,
    form {
      margin-top: var(--space-3);
    }
    button {
      background: var(--accent);
      border: 1px solid var(--accent-dark);
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-weight: 700;
      padding: 0.44rem 0.72rem;
      transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }
    button:hover {
      background: var(--accent-dark);
    }
    button.secondary {
      background: #52616b;
      border-color: #43515a;
    }
    input:not([type="checkbox"]):not([type="radio"]),
    select,
    textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font: inherit;
      padding: 0.45rem 0.55rem;
      max-width: 42rem;
      width: 100%;
    }
    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
      outline: none;
    }
    label {
      color: #35444c;
      display: block;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    small {
      color: var(--muted);
      display: block;
      margin-top: 0.2rem;
    }
    input[type="file"] {
      display: block;
      margin: 0.4rem 0;
    }
    input[type="checkbox"],
    input[type="radio"] {
      margin-right: 0.35rem;
    }
    .message {
      background: var(--accent-soft);
      border: 1px solid #b9dcd5;
      border-radius: var(--radius);
      margin-bottom: var(--space-3);
      padding: 0.62rem 0.75rem;
    }
    .errors {
      background: var(--danger-soft);
      border-left: 3px solid var(--danger);
      color: var(--danger);
      display: block;
      margin: 0.4rem 0;
      padding: 0.35rem 0.5rem;
    }
    details {
      margin-top: 0.25rem;
    }
    summary {
      color: var(--accent);
      cursor: pointer;
      font-weight: 700;
    }
    textarea {
      box-sizing: border-box;
      display: block;
      margin: 0.4rem 0;
      max-width: 42rem;
      width: 100%;
    }
    .notes-text {
      background: var(--surface-soft);
      border: 1px solid var(--border-soft);
      border-radius: 6px;
      margin: 0.5rem 0;
      padding: 0.55rem 0.65rem;
      white-space: pre-wrap;
    }
    .metadata-list {
      margin: 0.5rem 0;
      padding-left: 1rem;
    }
    .metadata-list dt {
      font-weight: 700;
      margin-top: 0.4rem;
    }
    .metadata-list dd {
      margin-left: 0;
    }
    .inline-actions form {
      display: inline-block;
      margin: 0.2rem 0.4rem 0.2rem 0;
    }
    .artifact-list,
    .job-list {
      margin: 0.5rem 0;
      padding-left: 1.2rem;
    }
    .png-gallery {
      display: grid;
      gap: var(--space-3);
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      margin-top: 0.8rem;
    }
    .png-gallery img,
    .compare-grid img {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      max-width: 100%;
    }
    .compare-grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      margin-bottom: var(--space-4);
    }
    .page-header {
      align-items: flex-start;
      display: flex;
      gap: var(--space-3);
      justify-content: space-between;
      margin-bottom: var(--space-4);
    }
    .page-header-main {
      min-width: 0;
    }
    .page-header-actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      justify-content: flex-end;
      margin-top: 0.1rem;
    }
    .back-link {
      color: var(--muted);
      display: inline-block;
      font-size: 0.9rem;
      margin-bottom: var(--space-2);
    }
    .lead-text,
    .object-subtitle {
      color: var(--muted);
      margin-top: var(--space-1);
      max-width: 60rem;
    }
    .section-header {
      align-items: center;
      display: flex;
      gap: var(--space-3);
      justify-content: space-between;
      margin: var(--space-5) 0 var(--space-3);
    }
    .section-header h2 {
      margin: 0;
    }
    .section-actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      justify-content: flex-end;
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: var(--space-4);
      padding: var(--space-4);
    }
    .panel > :first-child {
      margin-top: 0;
    }
    .panel > :last-child {
      margin-bottom: 0;
    }
    .empty-state {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      margin-bottom: var(--space-4);
      padding: var(--space-4);
    }
    .table-wrap {
      border-radius: var(--radius);
      margin-bottom: var(--space-4);
      overflow-x: auto;
    }
    .object-layout {
      align-items: stretch;
      display: grid;
      gap: var(--space-4);
      grid-template-columns: minmax(0, 1fr);
      margin-bottom: var(--space-4);
    }
    .object-main {
      min-width: 0;
    }
    .properties-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1rem;
    }
    .properties-panel h2,
    .properties-panel h3 {
      margin-top: 0;
    }
    .properties-list {
      margin: 0;
    }
    .properties-list dt {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 700;
      margin-top: 0.8rem;
    }
    .properties-list dd {
      margin: 0.15rem 0 0;
      overflow-wrap: anywhere;
    }
    .desktop-only {
      display: none;
    }
    form p {
      max-width: 42rem;
      margin-bottom: var(--space-3);
    }
    form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: var(--space-4);
    }
    .inline-actions form,
    .section-actions form,
    .page-header-actions form,
    td form,
    details form {
      background: transparent;
      border: 0;
      box-shadow: none;
      margin: 0;
      padding: 0;
    }
    @media (min-width: 980px) {
      .object-layout {
        grid-template-columns: minmax(0, 1fr) 19rem;
      }
      .mobile-properties-link,
      .mobile-only {
        display: none;
      }
      .desktop-only {
        display: inline;
      }
    }
    @media (max-width: 720px) {
      main {
        padding: var(--space-3);
      }
      .page-header,
      .section-header {
        display: block;
      }
      .page-header-actions,
      .section-actions {
        justify-content: flex-start;
        margin-top: var(--space-2);
      }
    }
    @media (max-width: 979px) {
      .properties-panel {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav class="navbar navbar-dark">
      <a class="navbar-brand" href="{% url 'plm:project_list' %}">FreeCAD-PLM</a>
    </nav>
  </header>
  <main>
    {% for message in messages %}
      <div class="message alert mb-3">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
  <script src="{% static 'plm/vendor/bootstrap4/js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
