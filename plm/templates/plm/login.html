{% load static %}
<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anmelden | FreeCAD-PLM</title>
  <link rel="stylesheet" href="{% static 'plm/app.css' %}">
</head>
<body>
  <main class="login-page">
    <section class="login-panel" aria-labelledby="login-title">
      <div class="brand-block" style="border:0;padding:0;margin-bottom:1.25rem;">
        <h1 id="login-title">FreeCAD-PLM</h1>
        <p class="login-subtitle">Anmelden und direkt mit Projekten und Revisionen weiterarbeiten.</p>
      </div>

      {% if form.errors %}
        <div class="errors">Benutzername oder Passwort stimmt nicht.</div>
      {% endif %}

      <form class="form-card" method="post" action="{% url 'plm:login' %}">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        <p>
          <label for="{{ form.username.id_for_label }}">Benutzername</label>
          {{ form.username }}
        </p>
        <p>
          <label for="{{ form.password.id_for_label }}">Passwort</label>
          {{ form.password }}
        </p>
        <button type="submit">Anmelden</button>
      </form>

      <p class="muted" style="margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--border);">
        <a href="{% url 'admin:index' %}">Django-Admin</a>
      </p>
    </section>
  </main>
</body>
</html>
