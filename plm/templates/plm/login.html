<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anmelden | FreeCAD-PLM</title>
  <style>
    :root {
      --accent: #19736b;
      --accent-dark: #10564f;
      --border: #d9e3e1;
      --danger: #a33b3b;
      --muted: #607078;
      --surface: #ffffff;
      --surface-soft: #f3f7f6;
      --text: #172326;
    }
    * {
      box-sizing: border-box;
    }
    body {
      background: #eef4f3;
      color: var(--text);
      font-family: Inter, "Segoe UI", system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
    }
    .login-shell {
      align-items: center;
      display: grid;
      min-height: 100vh;
      padding: 2rem;
    }
    .login-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 16px 40px rgba(18, 39, 43, 0.12);
      margin: 0 auto;
      max-width: 25rem;
      padding: 1.6rem;
      width: 100%;
    }
    .brand {
      margin-bottom: 1.25rem;
    }
    h1 {
      font-size: 1.55rem;
      letter-spacing: 0;
      margin: 0;
    }
    .subtitle {
      color: var(--muted);
      margin: 0.35rem 0 0;
    }
    .form-row {
      display: grid;
      gap: 0.35rem;
      margin-top: 0.85rem;
    }
    label {
      color: #314247;
      font-size: 0.9rem;
      font-weight: 700;
    }
    input {
      border: 1px solid var(--border);
      border-radius: 6px;
      font: inherit;
      min-height: 2.45rem;
      padding: 0.45rem 0.6rem;
      width: 100%;
    }
    input:focus {
      border-color: var(--accent);
      outline: 2px solid rgba(25, 115, 107, 0.18);
    }
    .error {
      background: #fff0f0;
      border-left: 3px solid var(--danger);
      color: var(--danger);
      margin: 0.75rem 0;
      padding: 0.55rem 0.65rem;
    }
    .actions {
      align-items: center;
      display: flex;
      gap: 0.75rem;
      justify-content: space-between;
      margin-top: 1.1rem;
    }
    button {
      background: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      padding: 0.55rem 0.85rem;
    }
    button:hover {
      background: var(--accent-dark);
    }
    a {
      color: var(--accent-dark);
      font-size: 0.9rem;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .admin-link {
      border-top: 1px solid var(--border);
      margin-top: 1.2rem;
      padding-top: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="login-shell">
    <section class="login-panel" aria-labelledby="login-title">
      <div class="brand">
        <h1 id="login-title">FreeCAD-PLM</h1>
        <p class="subtitle">Anmelden und direkt weiterarbeiten.</p>
      </div>

      {% if form.errors %}
        <div class="error">Benutzername oder Passwort stimmt nicht.</div>
      {% endif %}

      <form method="post" action="{% url 'plm:login' %}">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        <div class="form-row">
          <label for="{{ form.username.id_for_label }}">Benutzername</label>
          {{ form.username }}
        </div>
        <div class="form-row">
          <label for="{{ form.password.id_for_label }}">Passwort</label>
          {{ form.password }}
        </div>
        <div class="actions">
          <button type="submit">Anmelden</button>
        </div>
      </form>

      <div class="admin-link">
        <a href="{% url 'admin:index' %}">Django-Admin</a>
      </div>
    </section>
  </main>
</body>
</html>
