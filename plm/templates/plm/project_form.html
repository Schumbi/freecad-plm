{% extends "plm/base.html" %}

{% block content %}
  <p><a href="{% url 'plm:project_list' %}">Zurueck zu Projekten</a></p>
  <h1>Neues Projekt</h1>

  <form method="post">
    {% csrf_token %}
    {% for field in form %}
      <p>
        {{ field.label_tag }}
        {{ field }}
        {% if field.errors %}
          <span class="errors">{{ field.errors }}</span>
        {% endif %}
      </p>
    {% endfor %}
    <button type="submit">Anlegen</button>
  </form>
{% endblock %}
