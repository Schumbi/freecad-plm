services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-freecad_plm}
      POSTGRES_USER: ${POSTGRES_USER:-freecad_plm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in .env gesetzt sein}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ${PLM_IMAGE:?PLM_IMAGE muss in .env gesetzt sein}
    user: "${PLM_UID:-1000}:${PLM_GID:-1000}"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn freecad_plm.wsgi:application --bind 0.0.0.0:8000"
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?DJANGO_ALLOWED_HOSTS muss in .env gesetzt sein}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY muss in .env gesetzt sein}
      POSTGRES_DB: ${POSTGRES_DB:-freecad_plm}
      POSTGRES_USER: ${POSTGRES_USER:-freecad_plm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in .env gesetzt sein}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      PROCESS_EXPORT_JOBS_INLINE: "0"
    volumes:
      - ./storage:/app/storage
      - ./staticfiles:/app/staticfiles
    ports:
      - "${PLM_HTTP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    image: ${PLM_IMAGE:?PLM_IMAGE muss in .env gesetzt sein}
    user: "${PLM_UID:-1000}:${PLM_GID:-1000}"
    command: >
      sh -c "while true; do
             python manage.py process_export_jobs --limit 1;
             sleep 10;
             done"
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?DJANGO_ALLOWED_HOSTS muss in .env gesetzt sein}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY muss in .env gesetzt sein}
      POSTGRES_DB: ${POSTGRES_DB:-freecad_plm}
      POSTGRES_USER: ${POSTGRES_USER:-freecad_plm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in .env gesetzt sein}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      FREECADCMD_COMMAND: ${FREECADCMD_COMMAND:-freecadcmd}
      PREVIEW_PNG_WIDTH: ${PREVIEW_PNG_WIDTH:-400}
      PREVIEW_PNG_HEIGHT: ${PREVIEW_PNG_HEIGHT:-300}
    volumes:
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
