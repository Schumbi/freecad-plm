services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-freecad_plm}
      POSTGRES_USER: ${POSTGRES_USER:-freecad_plm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in .env gesetzt sein}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ${PLM_WEB_IMAGE:-freecad-plm-web:local}
    build:
      context: .
      args:
        INSTALL_FREECAD: "0"
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             if [ \"${GUNICORN_ACCESS_LOG:-1}\" = \"1\" ]; then
               gunicorn freecad_plm.wsgi:application --bind 0.0.0.0:8000 --access-logfile - --error-logfile - --log-level \"${GUNICORN_LOG_LEVEL:-info}\";
             else
               gunicorn freecad_plm.wsgi:application --bind 0.0.0.0:8000 --access-logfile /dev/null --error-logfile - --log-level \"${GUNICORN_LOG_LEVEL:-info}\";
             fi"
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?DJANGO_ALLOWED_HOSTS muss in .env gesetzt sein}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY muss in .env gesetzt sein}
      PLM_LOG_LEVEL: ${PLM_LOG_LEVEL:-INFO}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-${PLM_LOG_LEVEL:-INFO}}
      DJANGO_DB_LOG_LEVEL: ${DJANGO_DB_LOG_LEVEL:-WARNING}
      GUNICORN_LOG_LEVEL: ${GUNICORN_LOG_LEVEL:-info}
      GUNICORN_ACCESS_LOG: ${GUNICORN_ACCESS_LOG:-1}
      POSTGRES_DB: ${POSTGRES_DB:-freecad_plm}
      POSTGRES_USER: ${POSTGRES_USER:-freecad_plm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in .env gesetzt sein}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      PROCESS_EXPORT_JOBS_INLINE: "0"
    volumes:
      - media-data:/app/storage
      - static-data:/app/staticfiles
    ports:
      - "${PLM_HTTP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    image: ${PLM_WORKER_IMAGE:-freecad-plm-worker:local}
    user: "${PLM_USER:-plm}"
    build:
      context: .
      args:
        INSTALL_FREECAD: "1"
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    mem_limit: ${WORKER_MEM_LIMIT:-2g}
    cpus: ${WORKER_CPUS:-2.0}
    pids_limit: ${WORKER_PIDS_LIMIT:-256}
    command: >
      sh -c "while true; do
             python manage.py process_export_jobs --limit 1;
             sleep 10;
             done"
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-0}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:?DJANGO_ALLOWED_HOSTS muss in .env gesetzt sein}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?DJANGO_SECRET_KEY muss in .env gesetzt sein}
      PLM_LOG_LEVEL: ${PLM_LOG_LEVEL:-INFO}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-${PLM_LOG_LEVEL:-INFO}}
      DJANGO_DB_LOG_LEVEL: ${DJANGO_DB_LOG_LEVEL:-WARNING}
      POSTGRES_DB: ${POSTGRES_DB:-freecad_plm}
      POSTGRES_USER: ${POSTGRES_USER:-freecad_plm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss in .env gesetzt sein}
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      FREECADCMD_COMMAND: ${FREECADCMD_COMMAND:-freecadcmd}
      PREVIEW_PNG_WIDTH: ${PREVIEW_PNG_WIDTH:-400}
      PREVIEW_PNG_HEIGHT: ${PREVIEW_PNG_HEIGHT:-300}
      TMPDIR: /tmp
      # FreeCAD 1.0 braucht ein beschreibbares HOME (read-only Root-FS + tmpfs /tmp)
      HOME: /tmp
    volumes:
      - media-data:/app/storage
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres-data:
  media-data:
  static-data:
