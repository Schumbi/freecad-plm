name: Test and Build FreeCAD PLM Images

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: git.home.schumbi.de/ralf
  WEB_IMAGE_NAME: freecad-plm-web
  WORKER_IMAGE_NAME: freecad-plm-worker
  DOCKER_BUILDKIT: 1

jobs:
  build-image:
    runs-on: arch
    container:
      image: git.home.schumbi.de/ralf/debian-docker-builder:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build web image (ohne FreeCAD)
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}"
          docker build \
            --progress=plain \
            --pull=false \
            --target web \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${{ github.sha }}" \
            .

      - name: Alte PLM-Worker-Images entfernen
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}"
          docker images --format '{{.Repository}} {{.ID}}' \
            | awk -v image="${IMAGE}" '$1 == image { print $2 }' \
            | sort -u \
            | xargs -r docker image rm --force
          docker builder prune --all --force

      - name: Build worker image (mit FreeCAD)
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}"
          docker build \
            --progress=plain \
            --pull=false \
            --target worker \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${{ github.sha }}" \
            .

      - name: Run tests
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}"
          docker run --rm \
            -e DJANGO_DEBUG=1 \
            -e PROCESS_EXPORT_JOBS_INLINE=1 \
            "${IMAGE}:${{ github.sha }}" \
            python manage.py test --parallel auto --verbosity=1

      - name: Login to Registry
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login "${{ env.REGISTRY }}" \
            -u "${{ secrets.REGISTRY_USERNAME }}" \
            --password-stdin

      - name: Push images
        if: github.event_name != 'pull_request'
        run: |
          WEB="${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}"
          WORKER="${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}"
          docker push "${WEB}:latest"
          docker push "${WEB}:${{ github.sha }}"
          docker push "${WORKER}:latest"
          docker push "${WORKER}:${{ github.sha }}"
